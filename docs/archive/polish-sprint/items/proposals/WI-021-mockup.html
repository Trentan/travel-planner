<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="../../../style.css">
  <style>
    body { background: #f5f7fa; padding: 20px; font-family: 'DM Sans', sans-serif; }
    .container { width: 1000px; display: flex; gap: 40px; }
    .itinerary-mock { flex: 1; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    
    .day-card-old { border: 1px solid #eee; padding: 15px; margin-bottom: 20px; }
    .day-card-old * { margin: 5px 0; }
    
    .day-card-new { border: 1px solid #e0e0e0; border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 6px solid #1F6F8B; background: white; }
    .day-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: #1A242F; margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }
    .activity-item { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; padding: 8px; border-radius: 8px; transition: background 0.2s; }
    .activity-item:hover { background: #f8f9fa; }
    .activity-dot { width: 8px; height: 8px; border-radius: 50%; background: #1F6F8B; margin-top: 6px; }
    .activity-text { font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="container">
    <div>
      <h3>Standard (Before)</h3>
      <div class="itinerary-mock">
        <div class="day-card-old">
          <strong>Day 1: London</strong>
          <p>London Bridge</p>
          <p>Tower of London</p>
          <button class="action-btn" style="font-size: 0.7rem;">+ Add</button>
        </div>
      </div>
    </div>
    <div>
      <h3>Refined Spacing (Proposed)</h3>
      <div class="itinerary-mock">
        <div class="day-card-new">
          <div class="day-title">Day 1: London</div>
          <div class="activity-item">
            <div class="activity-dot"></div>
            <div class="activity-text">London Bridge</div>
          </div>
          <div class="activity-item">
            <div class="activity-dot"></div>
            <div class="activity-text">Tower of London</div>
          </div>
          <div style="margin-top: 15px;"><button class="action-btn">+ Add Activity</button></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
