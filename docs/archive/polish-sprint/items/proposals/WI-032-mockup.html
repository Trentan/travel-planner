<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="../../../style.css">
  <style>
    body { background: #f5f7fa; padding: 20px; font-family: 'DM Mono', monospace; }
    .container { background: white; padding: 20px; border-radius: 12px; border: 1px solid #ddd; }
    .row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; }
    .label { font-family: 'DM Sans', sans-serif; font-weight: 500; }
    .val-before { color: #cc0000; }
    .val-after { color: #27AE60; font-weight: 700; }
  </style>
</head>
<body>
  <div class="container">
    <h3>Currency Consistency (Proposed)</h3>
    <div class="row"><span class="label">Item Cost</span><span class="val-before">150</span> <span class="val-after">$150.00</span></div>
    <div class="row"><span class="label">Budget Total</span><span class="val-before">1240.5</span> <span class="val-after">$1,240.50</span></div>
    <div class="row"><span class="label">Leg Total</span><span class="val-before">$ 400</span> <span class="val-after">$400.00</span></div>
  </div>
</body>
</html>
