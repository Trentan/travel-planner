name: Feature request
description: Suggest a new capability or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: before
    attributes:
      label: Before
      description: What is missing, hard to use, or not possible today?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add screenshots, realistic trip data notes, reproduction notes, source references, or examples.
  - type: textarea
    id: proposed
    attributes:
      label: Proposed
      description: Describe the experience or behavior you want.
    validations:
      required: true
  - type: textarea
    id: after
    attributes:
      label: After
      description: What should be true for the user after this is complete?
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - Important
        - Polish
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Itinerary
        - Transport
        - Accommodation
        - Budget
        - Packing
        - Map
        - AI Builder
        - Import/export
        - PWA/offline
        - Documentation
  - type: dropdown
    id: modes
    attributes:
      label: Affected modes
      multiple: true
      options:
        - DDE - Desktop detailed
        - DCO - Desktop compact
        - MDE - Mobile detailed
        - MCO - Mobile compact
        - Not UI-specific
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] Save/load/export behavior is covered where applicable
        - [ ] Relevant tests pass
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification plan
      description: Commands, visual states, viewport modes, and data files to check when resolving this issue.
      placeholder: |
        - Use `backups/2026_June_July_Europe_Thailand.json` for visual testing
        - Check DDE/DCO/MDE/MCO where applicable
