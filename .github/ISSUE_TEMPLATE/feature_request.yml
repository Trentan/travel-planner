name: Feature request
description: Suggest a new capability or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: before
    attributes:
      label: Before
      description: What is missing, hard to use, or not possible today?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add screenshots, realistic trip data notes, reproduction notes, source references, or examples.
  - type: textarea
    id: before_screenshot
    attributes:
      label: Before screenshot
      description: Attach or link the current-state screenshot for UI work. Use "Not UI-specific" when appropriate.
  - type: textarea
    id: proposed
    attributes:
      label: Proposed
      description: Describe the experience or behavior you want.
    validations:
      required: true
  - type: textarea
    id: proposed_screenshot
    attributes:
      label: Proposed screenshot or mockup
      description: Attach or link a proposed-state screenshot, mockup, wireframe, or visual spec for UI work. Use "Not UI-specific" when appropriate.
  - type: textarea
    id: after
    attributes:
      label: After
      description: What should be true for the user after this is complete?
    validations:
      required: true
  - type: dropdown
    id: estimate
    attributes:
      label: Estimate
      options:
        - Quick Win (<1 hr)
        - Medium (2-8 hrs)
        - Major (1-3 days)
    validations:
      required: true
  - type: textarea
    id: files_impacted
    attributes:
      label: Files impacted
      description: Expected files/modules likely to change. Use TBD only when genuinely unknown.
      placeholder: |
        - js/itinerary.js
        - style.css
    validations:
      required: true
  - type: textarea
    id: tags
    attributes:
      label: Tags
      description: Labels to apply, including priority, effort, area, and type labels.
      placeholder: priority: important, effort: medium, area: itinerary, enhancement, ux
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - Important
        - Polish
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Itinerary
        - Transport
        - Accommodation
        - Budget
        - Packing
        - Map
        - AI Builder
        - Import/export
        - PWA/offline
        - Documentation
  - type: dropdown
    id: modes
    attributes:
      label: Affected modes
      multiple: true
      options:
        - DDE - Desktop detailed
        - MDE - Mobile detailed
        - Not UI-specific
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] Before screenshot captured or marked not UI-specific
        - [ ] Proposed screenshot/mockup captured or marked not UI-specific
        - [ ] After screenshot captured or marked not UI-specific
        - [ ] Estimate and files impacted reviewed
        - [ ] GitHub labels/tags applied
        - [ ] Save/load/export behavior is covered where applicable
        - [ ] Relevant tests pass
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification plan
      description: Commands, visual states, viewport modes, and data files to check when resolving this issue.
      placeholder: |
        - Use `backups/2026_June_July_Europe_Thailand.json` for visual testing
        - Check DDE/MDE where applicable (Light Mode and Dark Mode)
