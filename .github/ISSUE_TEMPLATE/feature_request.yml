name: Feature request
description: Suggest a new capability or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What need would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the experience or behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Any other approaches?
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Itinerary
        - Transport
        - Accommodation
        - Budget
        - Packing
        - Map
        - AI Builder
        - Import/export
        - PWA/offline
        - Documentation
