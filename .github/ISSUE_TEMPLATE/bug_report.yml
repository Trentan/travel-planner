name: Bug report
description: Report something that is broken or unreliable.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Load a trip JSON file
        3. Go to ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: viewport
    attributes:
      label: Where did you see it?
      multiple: true
      options:
        - Desktop
        - Mobile
        - Installed PWA
        - Browser tab
        - Offline mode
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Browser, OS, device, viewport size if known.
  - type: textarea
    id: attachments
    attributes:
      label: Screenshots or trip data notes
      description: Attach screenshots when useful. Do not upload private trip data unless you are comfortable sharing it.
