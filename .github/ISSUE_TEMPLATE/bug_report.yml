name: Bug report
description: Report something that is broken or unreliable.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: before
    attributes:
      label: Before
      description: What is broken, unreliable, or confusing?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add screenshots, trip data notes, console output, source references, or frequency.
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Load a trip JSON file
        3. Go to ...
    validations:
      required: true
  - type: textarea
    id: after
    attributes:
      label: After
      description: What should happen once fixed?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - Important
        - Polish
    validations:
      required: true
  - type: dropdown
    id: viewport
    attributes:
      label: Where did you see it?
      multiple: true
      options:
        - DDE - Desktop detailed
        - DCO - Desktop compact
        - MDE - Mobile detailed
        - MCO - Mobile compact
        - Installed PWA
        - Browser tab
        - Offline mode
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Browser, OS, device, viewport size if known.
  - type: textarea
    id: attachments
    attributes:
      label: Screenshots or trip data notes
      description: Attach screenshots when useful. Do not upload private trip data unless you are comfortable sharing it.
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Bug no longer reproduces
        - [ ] Regression coverage added or updated where practical
        - [ ] Relevant tests pass
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification plan
      description: Commands, modes, data files, and manual checks to use before closing.
