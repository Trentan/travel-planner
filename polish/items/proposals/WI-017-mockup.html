<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="../../../style.css">
  <style>
    body { background: #f5f7fa; padding: 20px; font-family: 'DM Sans', sans-serif; }
    .modal-content { max-width: 500px; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
    .modal-header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 20px; }
    .ai-form-group { margin-bottom: 15px; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: #666; margin-bottom: 5px; }
    input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="modal-content">
    <div class="modal-header"><h2>🤖 AI Builder (Pre-filled)</h2></div>
    <div class="modal-body">
      <div class="ai-form-group">
        <label>Trip Title</label>
        <input type="text" value="Europe Summer Getaway 2026">
      </div>
      <div class="ai-form-group">
        <label>Dates & Flights</label>
        <input type="text" value="June 10 - July 24, 2026">
      </div>
      <div class="ai-form-group">
        <label>Cities to Visit</label>
        <input type="text" value="London, Paris, Rome, Bangkok, Taipei">
      </div>
      <p style="font-size: 0.75rem; color: #1F6F8B; font-style: italic;">✨ Data automatically synced from your current trip</p>
    </div>
  </div>
</body>
</html>
