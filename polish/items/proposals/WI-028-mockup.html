<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="../../../style.css">
  <style>
    body { background: #f5f7fa; padding: 20px; font-family: 'DM Sans', sans-serif; }
    .phone-frame { width: 390px; height: 844px; background: white; border: 12px solid #333; border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
    
    /* Mocking the "Condensed" state */
    .mock-header { height: 60px; background: #1A242F; color: white; display: flex; align-items: center; padding: 0 20px; transition: all 0.3s; }
    .mock-header.condensed { height: 40px; font-size: 0.8rem; }
    
    .mock-nav-stack { position: sticky; top: 0; background: white; border-bottom: 1px solid #eee; z-index: 10; transition: transform 0.3s; }
    .mock-nav-stack.condensed { transform: translateY(-40px); } /* Hide the top bar */
    
    .mock-tabs { display: flex; height: 50px; border-bottom: 1px solid #eee; }
    .mock-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; color: #666; }
    .mock-tab.active { color: #1F6F8B; border-bottom: 2px solid #1F6F8B; }
    
    .mock-city-nav { height: 40px; background: #FAFAF8; display: flex; align-items: center; padding: 0 10px; gap: 10px; overflow-x: auto; }
    .mock-city-chip { padding: 4px 12px; background: white; border: 1px solid #ddd; border-radius: 20px; font-size: 0.75rem; white-space: nowrap; }
    
    .content { padding: 20px; height: 1000px; background: linear-gradient(to bottom, #fff, #f9f9f9); }
    .card { height: 150px; background: white; border: 1px solid #eee; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
    
    .condensed-indicator { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div style="display: flex; gap: 40px; align-items: flex-start;">
    <div>
      <h3 style="text-align: center;">Standard (Before)</h3>
      <div class="phone-frame">
        <div class="mock-header">
          <div style="font-weight: 600;">Europe 2026</div>
        </div>
        <div class="mock-nav-stack">
          <div class="mock-tabs">
            <div class="mock-tab active"><span>🗺️</span><span>Itinerary</span></div>
            <div class="mock-tab"><span>✈️</span><span>Transp</span></div>
            <div class="mock-tab"><span>🏨</span><span>Accom</span></div>
            <div class="mock-tab"><span>💰</span><span>Budget</span></div>
          </div>
          <div class="mock-city-nav">
            <div class="mock-city-chip" style="border-color: #1F6F8B; color: #1F6F8B;">🏙️ All</div>
            <div class="mock-city-chip">London</div>
            <div class="mock-city-chip">Paris</div>
          </div>
        </div>
        <div class="content">
          <div class="card"></div>
          <div class="card"></div>
        </div>
      </div>
    </div>

    <div>
      <h3 style="text-align: center;">Condensed on Scroll (Proposed)</h3>
      <div class="phone-frame">
        <div class="mock-header condensed">
          <div style="font-weight: 600;">Europe 2026</div>
        </div>
        <div class="mock-nav-stack condensed">
          <div class="mock-tabs">
            <div class="mock-tab active"><span>🗺️</span><span>Itinerary</span></div>
            <div class="mock-tab"><span>✈️</span><span>Transp</span></div>
            <div class="mock-tab"><span>🏨</span><span>Accom</span></div>
            <div class="mock-tab"><span>💰</span><span>Budget</span></div>
          </div>
          <div class="mock-city-nav" style="height: 30px; padding: 0 5px;">
             <div class="mock-city-chip" style="font-size: 0.65rem; padding: 2px 8px;">🏙️ All</div>
             <div class="mock-city-chip" style="font-size: 0.65rem; padding: 2px 8px;">London</div>
          </div>
        </div>
        <div class="content" style="padding-top: 10px;">
          <div class="card" style="border-left: 4px solid #1F6F8B;"></div>
          <div class="card"></div>
          <div class="card"></div>
          <div class="card"></div>
        </div>
        <div class="condensed-indicator">Scrolling down...</div>
      </div>
    </div>
  </div>
</body>
</html>
