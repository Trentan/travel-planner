<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="../../../style.css">
  <style>
    body { background: #f5f7fa; padding: 20px; font-family: 'DM Sans', sans-serif; }
    .phone-frame { width: 390px; height: 600px; background: white; border: 12px solid #333; border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
    
    .day-card { border: 1px solid #eee; margin: 10px; border-radius: 12px; padding: 10px; }
    .day-header { font-weight: 600; font-size: 0.9rem; margin-bottom: 5px; }
    .activity-slot { height: 40px; border: 1px dashed #ccc; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #999; font-size: 0.8rem; }
    
    .idea-card { background: white; border: 1px solid #ddd; border-radius: 12px; margin: 10px; padding: 12px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .idea-icon { font-size: 1.2rem; }
    .idea-text { flex: 1; font-size: 0.85rem; }
    .assign-btn { background: #1F6F8B; color: white; border: none; padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    
    /* Placement mode */
    .placement-mode .day-card { border-color: #1F6F8B; background: #f0f7ff; cursor: pointer; transform: scale(1.02); transition: all 0.2s; }
    .placement-mode .day-card:hover { background: #e1f0ff; }
    .placement-overlay { position: absolute; inset: 0; background: rgba(31, 111, 139, 0.1); display: flex; align-items: flex-end; justify-content: center; pointer-events: none; }
    .placement-tip { background: #1F6F8B; color: white; padding: 10px 20px; border-radius: 20px; margin-bottom: 40px; font-size: 0.9rem; pointer-events: auto; }
  </style>
</head>
<body>
  <div style="display: flex; gap: 40px;">
    <div>
      <h3 style="text-align: center;">Touch D&D (Before)</h3>
      <div class="phone-frame">
        <div class="idea-card">
          <div class="idea-icon">🍕</div>
          <div class="idea-text">Dinner at Gino's</div>
          <div style="color: #ccc; cursor: move;">⠿</div>
        </div>
        <div class="day-card">
          <div class="day-header">Day 1: London</div>
          <div class="activity-slot">Empty slot</div>
        </div>
        <p style="padding: 20px; font-size: 0.8rem; color: #666; text-align: center;">(Dragging doesn't work on mobile)</p>
      </div>
    </div>

    <div>
      <h3 style="text-align: center;">Tap-to-Assign (Proposed)</h3>
      <div class="phone-frame placement-mode">
        <div class="idea-card" style="opacity: 0.5;">
          <div class="idea-icon">🍕</div>
          <div class="idea-text">Dinner at Gino's</div>
          <button class="assign-btn">Assigning...</button>
        </div>
        <div class="day-card">
          <div class="day-header">Day 1: London</div>
          <div class="activity-slot" style="border-color: #1F6F8B; color: #1F6F8B; font-weight: 600;">Tap to place here</div>
        </div>
        <div class="day-card">
          <div class="day-header">Day 2: Paris</div>
          <div class="activity-slot" style="border-color: #1F6F8B; color: #1F6F8B; font-weight: 600;">Tap to place here</div>
        </div>
        <div class="placement-overlay">
          <div class="placement-tip">Tap a day to assign activity</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
