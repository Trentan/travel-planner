<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Travel Planner">
  <title>Travel Planner</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1A242F">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="app-menu-bar">
  <div class="app-menu-left">
    <span class="file-badge" id="activeFileDisplay">📂 Default Template</span>
    <span class="save-status" id="saveStatus"></span>
  </div>
  <div class="app-menu-right">
    <button id="modeToggleBtn" class="app-menu-btn" onclick="toggleMode()">📋 Fun Mode</button>
    <button id="editToggleBtn" class="app-menu-btn" onclick="toggleEditMode()">🔒 Lock: Read Only</button>
    <button id="compactToggleBtn" class="app-menu-btn" onclick="toggleCompactView()">📄 Compact View</button>
    <span style="color: rgba(255,255,255,0.2);">|</span>
    <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importJSON(event)">
    <button class="app-menu-btn" onclick="document.getElementById('importFile').click()">📥 Import JSON</button>
    <button class="app-menu-btn" onclick="exportJSON()">📤 Export Backup</button>
    <button class="app-menu-btn danger" onclick="resetData()">Reset App</button>
  </div>
</div>

<header>
  <div class="header-inner">
    <div class="header-text">
      <h1 contenteditable="true" id="mainTitle"></h1>
      <p contenteditable="true" id="mainSubtitle"></p>
    </div>
    <div class="header-widgets">
      <div class="clock-widget">
        <div class="clock-row"><span class="clock-label">🏠 Home</span><span id="time-joy">--:--</span></div>
        <div class="clock-row"><span class="clock-label">🌍 Destination 1</span><span id="time-eur">--:--</span></div>
        <div class="clock-row"><span class="clock-label">🌏 Destination 2</span><span id="time-tha">--:--</span></div>
      </div>
    </div>
  </div>
</header>

<nav class="leg-nav" id="legNav"></nav>

<main>
  <div class="app-tabs">
    <button class="app-tab-btn active" onclick="switchTab('itinerary', this)">🗺️ Itinerary</button>
    <button class="app-tab-btn" onclick="switchTab('transport', this)">✈️ Transport</button>
    <button class="app-tab-btn" onclick="switchTab('accom', this)">🏨 Accommodation</button>
    <button class="app-tab-btn" onclick="switchTab('budget', this)">💰 Budget</button>
    <button class="app-tab-btn" onclick="switchTab('packing', this)">🧳 Packing</button>
    <button class="app-tab-btn" onclick="switchTab('ai', this)">🤖 AI Builder</button>
  </div>

  <div id="tab-itinerary" class="tab-pane active">
    <div class="top-controls">
      <button class="action-btn" onclick="addLeg()">+ Add New Leg</button>
      <button class="action-btn" onclick="toggleAllDays()" id="expandAll">▼ Expand all days</button>
      <button class="action-btn" onclick="toggleAllLegs()" id="expandAllLegs">▲ Collapse all legs</button>
    </div>
    <div id="itinerary"></div>
    <div class="controls-container">
      <div class="print-group">
        <button class="action-btn" onclick="printPage('summary')">🖨 Print Summary View</button>
        <button class="action-btn" onclick="printPage('detailed')">🖨 Print Detailed View</button>
      </div>
    </div>
  </div>

  <div id="tab-transport" class="tab-pane">
    <div id="transport-table-container"></div>
  </div>

  <div id="tab-accom" class="tab-pane">
    <div id="accom-table-container"></div>
  </div>

  <div id="tab-budget" class="tab-pane">
    <div id="budget-kpi-container" class="budget-kpi-grid"></div>
    <div id="budget-table-container"></div>
  </div>

  <div id="tab-packing" class="tab-pane">
    <div id="guides-container" class="guides-container"></div>
    <div id="packing-areas-container"></div>
  </div>

  <div id="tab-ai" class="tab-pane">
    <div class="ai-container">
      <div class="ai-form-group">
        <label for="aiTripTitle">Trip Title</label>
        <input type="text" id="aiTripTitle" placeholder="e.g., Europe Summer Getaway">
      </div>
      <div class="ai-form-group">
        <label for="aiTripDates">Dates & Flights</label>
        <input type="text" id="aiTripDates" placeholder="e.g., June 10-24, 2026. BNE-LHR outbound, FCO-BNE return">
      </div>
      <div class="ai-form-group">
        <label for="aiTripCities">Cities to Visit</label>
        <input type="text" id="aiTripCities" placeholder="e.g., London, Paris, Rome">
      </div>
      <div class="ai-form-group">
        <label for="aiTripVibe">Travel Vibe & Preferences</label>
        <textarea id="aiTripVibe" placeholder="e.g., Relaxed pacing, great food, no early mornings. Enjoy walking and photography."></textarea>
      </div>

      <button class="ai-generate-btn" onclick="generatePrompt()">🪄 Generate AI Prompt</button>

      <div id="aiOutputBox" class="ai-output-box">
        <h3>Copy this prompt into your AI:</h3>
        <textarea id="aiPromptOutput" readonly></textarea>
        <button class="action-btn" onclick="copyPrompt()">📋 Copy Prompt to Clipboard</button>
      </div>
    </div>
  </div>
</main>

<script src="./js/utils.js"></script>
<script src="./js/data.js"></script>
<script src="./js/packing.js"></script>
<script src="./js/dragdrop.js"></script>
<script src="./js/crud.js"></script>
<script src="./js/tabs.js"></script>
<script src="./js/ai.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/itinerary.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed:', err));
  });
}

setInterval(updateClocks, 1000);
updateClocks();

initData();
buildNav();
buildItinerary();
reObserveLegs();
</script>
</body>
</html>
